name: Release Frontend to Cloud Run

on:
  repository_dispatch:
    types: [angularjs-frontend-release]

env:
  GCP_REGION: "us-central1"
  IMAGE_NAME: "angularjs-frontend"
  RUNTIME_SA_EMAIL: "github-actions-runtime-sa@chizhg-vpc-sc-testing.iam.gserviceaccount.com"

permissions:
  contents: 'read'
  id-token: 'write'
  packages: 'write'

jobs:
  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build-and-push.outputs.image_ref }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.tag_name }}
          token: ${{ secrets.GH_PAT }}

      - name: "Authenticate to Google Cloud"
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: "Setup Google Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Configure Docker for Artifact Registry"
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: "Build, tag, and push container image"
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.event.client_payload.tag_name }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          labels: "git-sha=${{ github.sha }}"

      - name: "Create image reference artifact"
        id: "create-artifact"
        run: |
          IMAGE_REF="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}"
          echo "Image reference: $IMAGE_REF"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo $IMAGE_REF > ./image_ref.txt

      - name: "Upload image reference artifact"
        uses: actions/upload-artifact@v4
        with:
          name: image-reference
          path: ./image_ref.txt

  test-pre-dev:
    name: "Pre-Deploy Test (Dev)"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: "Hello World"
        run: echo "Hello World - Pre-Deploy Test (Dev)"

  deploy-dev:
    name: "Deploy to Dev"
    runs-on: ubuntu-latest
    needs: test-pre-dev
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: "Download image reference artifact"
        uses: actions/download-artifact@v4
        with:
          name: image-reference

      - name: "Read image reference from artifact"
        id: "image-ref"
        run: |
          IMAGE_REF=$(cat ./image_ref.txt)
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_ENV

      - name: "Deploy to Cloud Run (Dev)"
        id: deploy
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: ${{ vars.CLOUDRUN_FRONTEND_SERVICE_DEV }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.image_ref }}
          flags: "--service-account=${{ env.RUNTIME_SA_EMAIL }}"
          env_vars: |
            RELEASE_VERSION=${{ github.event.client_payload.tag_name }}
            BACKEND_URL=${{ vars.BACKEND_URL_DEV }}

  test-post-dev:
    name: "Post-Deploy Test (Dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: "Hello World"
        run: echo "Hello World - Post-Deploy Test (Dev)"

  test-pre-staging:
    name: "Pre-Deploy Test (Staging)"
    runs-on: ubuntu-latest
    needs: test-post-dev
    steps:
      - name: "Hello World"
        run: echo "Hello World - Pre-Deploy Test (Staging)"

  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: test-pre-staging
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: "Download image reference artifact"
        uses: actions/download-artifact@v4
        with:
          name: image-reference

      - name: "Read image reference from artifact"
        id: "image-ref"
        run: |
          IMAGE_REF=$(cat ./image_ref.txt)
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_ENV

      - name: "Deploy to Cloud Run (Staging)"
        id: deploy
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: ${{ vars.CLOUDRUN_FRONTEND_SERVICE_STAGING }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.image_ref }}
          flags: "--service-account=${{ env.RUNTIME_SA_EMAIL }}"
          env_vars: |
            RELEASE_VERSION=${{ github.event.client_payload.tag_name }}
            BACKEND_URL=${{ vars.BACKEND_URL_STAGING }}

  test-post-staging:
    name: "Post-Deploy Test (Staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: "Hello World"
        run: echo "Hello World - Post-Deploy Test (Staging)"

  test-pre-production-1:
    name: "Pre-Deploy Test 1 (Production)"
    runs-on: ubuntu-latest
    needs: test-post-staging
    steps:
      - name: "Hello World"
        run: echo "Hello World - Pre-Deploy Test 1 (Production)"

  test-pre-production-2:
    name: "Pre-Deploy Test 2 (Production)"
    runs-on: ubuntu-latest
    needs: test-post-staging
    steps:
      - name: "Hello World"
        run: echo "Hello World - Pre-Deploy Test 2 (Production)"

  test-pre-production-3:
    name: "Pre-Deploy Test 3 (Production)"
    runs-on: ubuntu-latest
    needs: test-post-staging
    steps:
      - name: "Hello World"
        run: echo "Hello World - Pre-Deploy Test 3 (Production)"

  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [test-pre-production-1, test-pre-production-2, test-pre-production-3]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    concurrency: production
    steps:
      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: "Download image reference artifact"
        uses: actions/download-artifact@v4
        with:
          name: image-reference

      - name: "Read image reference from artifact"
        id: "image-ref"
        run: |
          IMAGE_REF=$(cat ./image_ref.txt)
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_ENV

      - name: "Deploy to Cloud Run (Production)"
        id: deploy
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: ${{ vars.CLOUDRUN_FRONTEND_SERVICE_PRODUCTION }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.image_ref }}
          flags: "--service-account=${{ env.RUNTIME_SA_EMAIL }}"
          env_vars: |
            RELEASE_VERSION=${{ github.event.client_payload.tag_name }}
            BACKEND_URL=${{ vars.BACKEND_URL_PRODUCTION }}

  test-post-production:
    name: "Post-Deploy Test (Production)"
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: "Hello World"
        run: echo "Hello World - Post-Deploy Test (Production)"
